<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Smart Home - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2>Cadastro de Dispositivo (Smart Home)</h2>
            </div>
            <div class="card-body">
                <form action="controle_dispositivo" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Nome do Aparelho:</label>
                            <input type="text" name="txtNome" class="form-control" required placeholder="Ex: Geladeira">
                        </div>
                        <div class="col-md-6">
                            <label>Cômodo:</label>
                            <input type="text" name="txtComodo" class="form-control" required placeholder="Ex: Cozinha">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label>Marca:</label>
                            <input type="text" name="txtMarca" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label>Potência (Watts):</label>
                            <input type="number" step="1" name="txtPotencia" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label>Horas de uso/dia:</label>
                            <input type="number" step="1" name="txtHorasUso" class="form-control" required>
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <label>Voltagem:</label>
                            <select name="txtVoltagem" class="form-select">
                                <option value="110">110v</option>
                                <option value="220">220v</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Status Inicial:</label>
                            <select name="txtStatus" class="form-select">
                                <option value="Ligado">Ligado</option>
                                <option value="Desligado">Desligado</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Observação:</label>
                            <input type="text" name="txtObservacao" class="form-control">
                        </div>
                    </div>
                    <hr>
                    <input type="submit" name="op" value="CADASTRAR" class="btn btn-success">
                    <input type="submit" name="op" value="CONSULTAR TODOS" class="btn btn-primary" formnovalidate>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
